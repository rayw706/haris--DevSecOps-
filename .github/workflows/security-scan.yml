name: Security Scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Train model
        run: |
          python -c "from src.ml_ranker import train_model; print(train_model('src/vulnerable_samples','src/vulnerable_samples/labels.csv','model.joblib'))"
      - name: Run scanner on changed files
        run: |
          python main.py .
